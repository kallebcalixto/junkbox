<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

const firebaseConfig = { databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let player, playerReady = false;
let creditos = 0, musicasRestantes = 0;
let dbDados = {}, generos = [], focoP = 0, focoM = 0;
let pastaAtiva = null, fila = [], tocando = false;


// 🔥 PLAYER CORRIGIDO
window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-player', {
        events: {
            'onReady': () => playerReady = true,
            'onStateChange': onPlayerStateChange,
            'onError': () => proximoVideo()
        }
    });
};


// 🔥 CONTROLE DE FIM
function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        proximoVideo();
    }
}


// 🔥 PRÓXIMO
function proximoVideo() {
    fila.shift();

    if (fila.length > 0) {
        tocarVideo(fila[0].id);
    } else {
        tocando = false;
        document.getElementById('player-container').classList.remove('fullscreen-active');
        document.getElementById('status-txt').innerText = "KBS TV - PRONTA";
    }

    renderFilaVisual();
}


// 🔥 TOCAR (AGORA FUNCIONA SEMPRE)
function tocarVideo(id) {
    if (!playerReady) {
        setTimeout(() => tocarVideo(id), 300);
        return;
    }

    tocando = true;

    const container = document.getElementById('player-container');
    container.classList.add('fullscreen-active');

    player.loadVideoById(id);
    player.mute(); // 🔥 ESSENCIAL

    renderFilaVisual();
}


// 🔥 FIREBASE (SEM BUG)
onValue(ref(db, 'jukebox'), (snap) => {
    dbDados = snap.val() || {};
    generos = Object.keys(dbDados);

    const menu = document.getElementById('menu-pastas');
    menu.innerHTML = "";

    generos.forEach((g, i) => {
        const btn = document.createElement('div');
        btn.className = `btn-gen ${i === focoP ? 'active' : ''}`;
        btn.innerText = g;
        menu.appendChild(btn);
    });

    if (pastaAtiva) renderRoleta();
});


// 🔥 ROLETA
function renderRoleta() {
    const cont = document.getElementById('container-roleta');
    cont.innerHTML = ""; 

    if(!pastaAtiva || !dbDados[pastaAtiva]) return;

    const musicas = Object.values(dbDados[pastaAtiva]);

    musicas.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
        card.innerHTML = `
            <img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">
            <div class="info-txt">${m.titulo}</div>
        `;
        cont.appendChild(card);

        if(i === focoM) {
            card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
    });
}


// 🔥 FILA
function renderFilaVisual() {
    const cont = document.getElementById('container-fila');
    cont.innerHTML = "";

    fila.forEach(m => {
        const item = document.createElement('div');
        item.className = 'fila-item';
        item.innerHTML = `<img src="https://img.youtube.com/vi/${m.id}/mqdefault.jpg">`;
        cont.appendChild(item);
    });
}


// 🔥 CONTROLES (SEM BUG)
document.addEventListener('keydown', (e) => {

    if (e.key === "Enter") {
        creditos++;
        musicasRestantes += 5;
        document.getElementById('val-creditos').innerText = creditos;
    }

    if (!generos.length) return;

    if (e.key === "ArrowRight") {
        focoP = (focoP + 1) % generos.length;
    }

    if (e.key === "ArrowLeft") {
        focoP = (focoP - 1 + generos.length) % generos.length;
    }

    if (e.code === "Space") {
        e.preventDefault();
        pastaAtiva = generos[focoP];
        focoM = 0;
        renderRoleta();
    }

    if (!pastaAtiva) return;

    const lista = Object.values(dbDados[pastaAtiva]);

    if (e.key === "ArrowDown") {
        focoM = (focoM + 1) % lista.length;
        renderRoleta();
    }

    if (e.key === "ArrowUp") {
        focoM = (focoM - 1 + lista.length) % lista.length;
        renderRoleta();
    }

    if (e.key.toUpperCase() === "E" && musicasRestantes > 0) {

        fila.push({ id: lista[focoM].videoID });

        musicasRestantes--;

        if(musicasRestantes % 5 === 0 && creditos > 0) {
            creditos--;
            document.getElementById('val-creditos').innerText = creditos;
        }

        renderFilaVisual();

        // 🔥 INICIA AUTOMÁTICO
        if (musicasRestantes === 0 && fila.length > 0 && !tocando) {
            tocarVideo(fila[0].id);
        }
    }
});
</script>
