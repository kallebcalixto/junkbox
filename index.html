<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>KBS TV</title>

<style>
:root { --blue:#00d2ff; --pink:#ff007f; --bg:#000; }
body { background:#000; color:#fff; margin:0; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

header { background:#111; padding:10px; display:flex; justify-content:space-between; border-bottom:2px solid var(--blue); }
.nav-pastas { display:flex; gap:5px; overflow:auto; }
.btn-gen { padding:6px 10px; border:1px solid var(--blue); cursor:pointer; }
.btn-gen.active { background:var(--blue); color:#000; }

main { flex:1; display:flex; justify-content:center; align-items:center; }
.tv-frame { width:70%; aspect-ratio:16/9; background:#000; }
.fullscreen-active { position:fixed; top:0; left:0; width:100vw; height:100vh; }

footer { height:200px; display:flex; overflow-x:auto; }

.video-card { min-width:130px; margin:5px; border:2px solid #333; }
.video-card.foco-musica { border-color:var(--pink); }

.col-fila { position:fixed; right:0; top:80px; bottom:200px; width:140px; overflow:auto; }
.fila-item img { width:100%; }
</style>
</head>

<body>

<header>
<div class="nav-pastas" id="menu"></div>
<div>CRÉDITOS: <span id="cred">0</span></div>
</header>

<main>
<div class="tv-frame" id="player-box">
<div id="yt-player"></div>
</div>
</main>

<div class="col-fila" id="fila"></div>

<footer id="roleta"></footer>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL:"https://junck-3b41b-default-rtdb.firebaseio.com" });
const db = getDatabase(app);

let player, ready=false;
let dbDados={}, generos=[];
let focoP=0, focoM=0, pasta=null;
let fila=[], tocando=false;
let creditos=0, restantes=0;


// PLAYER
window.onYouTubeIframeAPIReady=()=>{
    player=new YT.Player('yt-player',{
        events:{
            onReady:()=> ready=true,
            onStateChange:e=>{
                if(e.data===YT.PlayerState.ENDED) next();
            },
            onError:()=> next()
        }
    });
};


// TOCAR
function play(id){
    if(!ready){
        setTimeout(()=>play(id),300);
        return;
    }

    tocando=true;
    player.loadVideoById(id);
    player.mute();

    document.getElementById('player-box').classList.add('fullscreen-active');
    renderFila();
}


// PROXIMO
function next(){
    fila.shift();

    if(fila.length){
        play(fila[0].id);
    } else {
        tocando=false;
        document.getElementById('player-box').classList.remove('fullscreen-active');
    }

    renderFila();
}


// FIREBASE
onValue(ref(db,'jukebox'),snap=>{
    dbDados=snap.val()||{};
    generos=Object.keys(dbDados);

    const menu=document.getElementById('menu');
    menu.innerHTML="";

    generos.forEach((g,i)=>{
        const b=document.createElement('div');
        b.className=`btn-gen ${i===focoP?'active':''}`;
        b.innerText=g;
        menu.appendChild(b);
    });

    if(pasta) renderRoleta();
});


// ROLETA
function renderRoleta(){
    const cont=document.getElementById('roleta');
    cont.innerHTML="";

    if(!pasta) return;

    const lista=Object.values(dbDados[pasta]);

    lista.forEach((m,i)=>{
        const c=document.createElement('div');
        c.className=`video-card ${i===focoM?'foco-musica':''}`;
        c.innerHTML=`<img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">`;
        cont.appendChild(c);
    });
}


// FILA
function renderFila(){
    const cont=document.getElementById('fila');
    cont.innerHTML="";

    fila.forEach(m=>{
        const d=document.createElement('div');
        d.className="fila-item";
        d.innerHTML=`<img src="https://img.youtube.com/vi/${m.id}/mqdefault.jpg">`;
        cont.appendChild(d);
    });
}


// CONTROLES
document.addEventListener('keydown',e=>{

    if(e.key==="Enter"){
        creditos++;
        restantes+=5;
        document.getElementById('cred').innerText=creditos;
    }

    if(!generos.length) return;

    if(e.key==="ArrowRight"){ focoP=(focoP+1)%generos.length; }
    if(e.key==="ArrowLeft"){ focoP=(focoP-1+generos.length)%generos.length; }

    if(e.code==="Space"){
        pasta=generos[focoP];
        focoM=0;
        renderRoleta();
    }

    if(!pasta) return;

    const lista=Object.values(dbDados[pasta]);

    if(e.key==="ArrowDown"){ focoM=(focoM+1)%lista.length; renderRoleta(); }
    if(e.key==="ArrowUp"){ focoM=(focoM-1+lista.length)%lista.length; renderRoleta(); }

    if(e.key.toUpperCase()==="E" && restantes>0){

        fila.push({
            id: lista[focoM].videoID
        });

        restantes--;

        renderFila();

        // 🔥 AGORA FUNCIONA CERTO
        if(restantes===0 && !tocando){
            play(fila[0].id);
        }
    }

});
</script>

</body>
</html>
