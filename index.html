<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS TV | ROCKOLA FINAL</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #000; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header { 
            background: #111; padding: 12px 20px; display: flex; gap: 12px;
            border-bottom: 2px solid var(--blue); overflow-x: auto; align-items: center;
            height: 60px; flex-shrink: 0;
        }
        
        .btn-gen {
            background: #222; border: 1px solid var(--blue); color: var(--blue);
            padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold;
            white-space: nowrap; transition: 0.3s; font-size: 14px;
        }
        
        .btn-gen.active { background: var(--blue); color: #000; box-shadow: 0 0 15px var(--blue); }

        main {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            padding: 10px; overflow: hidden; position: relative;
        }

        /* --- CORREÇÃO DO PLAYER: TAMANHO IDEAL --- */
        .tv-frame {
            width: 80%; /* Ocupa 80% da largura da área central */
            max-width: 760px; /* Limite de largura para não ficar gigante (correto pelas imagens) */
            aspect-ratio: 16/9; /* Mantém a proporção padrão de vídeo */
            background: #000; border: 8px solid #222; border-radius: 12px;
            box-shadow: 0 0 40px #000; overflow: hidden; flex-shrink: 0; transition: 0.4s;
        }

        /* Classe de Tela Cheia */
        .fullscreen-active {
            position: fixed; top: 0; left: 0; width: 100vw !important; height: 100vh !important;
            max-width: none !important; border: none; border-radius: 0; z-index: 999;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- CORREÇÃO DA ROLETA: ESPAÇAMENTO E VISIBILIDADE --- */
        footer {
            height: 190px; background: #0a0a0a; border-top: 1px solid #222;
            display: flex; align-items: center; padding: 0 20px; overflow-x: auto; flex-shrink: 0;
        }

        .video-card {
            min-width: 150px; margin-right: 25px; /* Mais espaço entre as capinhas (corrigido pelas imagens) */
            transition: 0.3s; background: #111; border-radius: 8px;
            border: 2px solid #333; position: relative;
        }

        .video-card.foco-musica {
            transform: translateY(-15px) scale(1.05); /* Subida mais suave para não tampar o player (corrigido) */
            border-color: var(--pink);
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.4);
        }

        .video-card img { width: 100%; display: block; border-radius: 6px; opacity: 0.4; }
        .video-card.foco-musica img { opacity: 1; }

        /* --- EXIBIÇÃO DO NOME REAL (ARTISTA E MÚSICA) --- */
        .balao-nome { 
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 140%; 
            background: var(--blue); color: #000; padding: 6px; border-radius: 5px; 
            font-weight: 900; font-size: 11px; opacity: 0; transition: 0.3s; text-align: center; text-transform: uppercase; z-index: 100; border: 1px solid #fff;
        }
        .video-card.foco-musica .balao-nome { opacity: 1; top: -60px; }

        .col-fila { position: fixed; right: 10px; top: 80px; width: 160px; bottom: 220px; border-left: 2px solid var(--pink); padding: 5px; }
        .fila-item img { width: 100%; border-radius: 4px; margin-bottom: 5px; border: 1px solid #333; }
    </style>
</head>
<body>

<header id="menu-pastas"></header>

<main>
    <div id="status-txt" style="color:var(--pink); font-weight:bold; margin-bottom:10px; font-size: 14px;">AGUARDANDO...</div>
    <div class="tv-frame" id="player-container">
        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#333; font-weight:bold;">INSIRA CRÉDITOS</div>
    </div>
</main>

<div class="col-fila" id="container-fila"></div>

<footer>
    <div id="container-roleta" style="display:flex; align-items: center; height: 100%;"></div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let creditos = 0, musicasRestantes = 0, dbDados = {}, generos = [], focoP = 0, focoM = 0;
    let pastaAtiva = null, fila = [], tocando = false;

    // Puxa as pastas organizadas
    onValue(ref(db, 'jukebox'), (snapshot) => {
        dbDados = snapshot.val() || {};
        generos = Object.keys(dbDados);
        renderPastas();
    });

    function renderPastas() {
        const menu = document.getElementById('menu-pastas');
        menu.innerHTML = "";
        generos.forEach((g, i) => {
            const btn = document.createElement('div');
            btn.className = `btn-gen ${i === focoP ? 'active' : ''}`;
            btn.innerText = g;
            menu.appendChild(btn);
        });
    }

    function renderRoleta() {
        const cont = document.getElementById('container-roleta');
        cont.innerHTML = "";
        if(!pastaAtiva || !dbDados[pastaAtiva]) return;
        const musicas = Object.values(dbDados[pastaAtiva]);
        musicas.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
            // PUXA O NOME REAL DO FIREBASE
            card.innerHTML = `<div class="balao-nome">${m.titulo}</div><img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">`;
            cont.appendChild(card);
            if(i === focoM) card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        });
    }

    function renderFila() {
        const cont = document.getElementById('container-fila');
        cont.innerHTML = "";
        fila.forEach(m => {
            const div = document.createElement('div');
            div.className = "fila-item";
            div.innerHTML = `<img src="https://img.youtube.com/vi/${m.id}/mqdefault.jpg">`;
            cont.appendChild(div);
        });
    }

    function iniciarMusica() {
        if (fila.length > 0) {
            tocando = true;
            const m = fila[0];
            const container = document.getElementById('player-container');
            container.classList.add('fullscreen-active'); // ATIVA TELA CHEIA VISUAL
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${m.id}?autoplay=1&enablejsapi=1&controls=0&rel=0" allow="autoplay"></iframe>`;
            
            window.addEventListener('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.event === 'infoDelivery' && data.info && data.info.playerState === 0) {
                        fila.shift(); // Remove a que acabou
                        if (fila.length > 0) iniciarMusica(); else { 
                            tocando = false; 
                            container.classList.remove('fullscreen-active'); // VOLTA AO NORMAL
                            container.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#333; font-weight:bold;">FIM DO SHOW</div>'; 
                            renderFila();
                            document.getElementById('status-txt').innerText = "KBS TV";
                        }
                    }
                } catch(e){}
            });
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "Enter") { creditos++; musicasRestantes += 5; document.getElementById('val-creditos').innerText = creditos; document.getElementById('status-txt').innerText = "ESCOLHA " + musicasRestantes + " MÚSICAS"; }
        if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; renderPastas(); }
        if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; renderPastas(); }
        if (e.code === "Space") { e.preventDefault(); pastaAtiva = generos[focoP]; focoM = 0; renderPastas(); renderRoleta(); document.getElementById('status-txt').innerText = "PASTA: " + pastaAtiva; }
        if (pastaAtiva) {
            const listaMus = Object.values(dbDados[pastaAtiva]);
            if (e.key === "ArrowDown") { focoM = (focoM + 1) % listaMus.length; renderRoleta(); }
            if (e.key === "ArrowUp") { focoM = (focoM - 1 + listaMus.length) % listaMus.length; renderRoleta(); }
            if (e.key.toUpperCase() === "E") {
                if (musicasRestantes > 0) {
                    const mus = listaMus[focoM];
                    fila.push({ id: mus.videoID, titulo: mus.titulo });
                    musicasRestantes--;
                    if(musicasRestantes % 5 === 0 && creditos > 0) creditos--;
                    document.getElementById('val-creditos').innerText = creditos;
                    document.getElementById('status-txt').innerText = "FALTAM " + musicasRestantes + " ESCOLHAS";
                    renderFila();
                    if (musicasRestantes === 0 && !tocando) iniciarMusica();
                } else if (creditos === 0 && musicasRestantes === 0) {
                    alert("COLOQUE CRÉDITO [ENTER]");
                }
            }
        }
    });
</script>
</body>
</html>
