<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS TV | ROCKOLA FINAL</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #111; padding: 12px 20px; display: flex; gap: 10px; border-bottom: 2px solid var(--blue); overflow-x: auto; align-items: center; height: 60px; flex-shrink: 0; }
        .btn-gen { background: #222; border: 1px solid var(--blue); color: var(--blue); padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-gen.active { background: var(--blue); color: #000; }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .tv-frame { width: 760px; aspect-ratio: 16/9; background: #000; border: 6px solid #222; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .fullscreen-active { position: fixed; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 999; border: none; }
        iframe { width: 100%; height: 100%; border: none; }
        footer { height: 190px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; overflow-x: auto; flex-shrink: 0; }
        .video-card { min-width: 150px; margin-right: 25px; transition: 0.3s; background: #111; border-radius: 8px; border: 2px solid #333; position: relative; }
        .balao-nome { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 140%; background: var(--blue); color: #000; padding: 6px; border-radius: 5px; font-weight: 900; font-size: 11px; opacity: 0; transition: 0.3s; text-align: center; text-transform: uppercase; z-index: 100; border: 1px solid #fff; }
        .video-card.foco-musica { transform: translateY(-15px) scale(1.05); border-color: var(--pink); }
        .video-card.foco-musica .balao-nome { opacity: 1; top: -60px; }
        .video-card img { width: 100%; display: block; border-radius: 6px; opacity: 0.4; }
        .video-card.foco-musica img { opacity: 1; }
        .col-fila { position: fixed; right: 10px; top: 80px; width: 160px; bottom: 220px; border-left: 2px solid var(--pink); padding: 5px; }
        .fila-item img { width: 100%; border-radius: 4px; margin-bottom: 5px; border: 1px solid #333; }
    </style>
</head>
<body>
<header id="menu-pastas"></header>
<main>
    <div id="status-txt" style="color:var(--pink); font-weight:bold; margin-bottom:10px;">KBS ROCKOLA</div>
    <div class="tv-frame" id="player-container"></div>
</main>
<div class="col-fila" id="container-fila"></div>
<footer><div id="container-roleta" style="display:flex; align-items: center;"></div></footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let creditos = 0, musicasRestantes = 0, dbDados = {}, generos = [], focoP = 0, focoM = 0;
    let pastaAtiva = null, fila = [], tocando = false;

    onValue(ref(db, 'jukebox'), (snap) => {
        dbDados = snap.val() || {};
        generos = Object.keys(dbDados);
        
        // LIMPA TUDO E RECONSTRÓI PARA NÃO SOBRAR MÚSICA APAGADA
        document.getElementById('menu-pastas').innerHTML = "";
        renderPastas();

        // Se a pasta ativa foi apagada, reseta a roleta
        if (pastaAtiva && !dbDados[pastaAtiva]) {
            pastaAtiva = null;
            document.getElementById('container-roleta').innerHTML = "";
        } else if (pastaAtiva) {
            renderRoleta();
        }
    });

    function renderPastas() {
        const menu = document.getElementById('menu-pastas');
        generos.forEach((g, i) => {
            const btn = document.createElement('div');
            btn.className = `btn-gen ${i === focoP ? 'active' : ''}`;
            btn.innerText = g;
            menu.appendChild(btn);
        });
    }

    function renderRoleta() {
        const cont = document.getElementById('container-roleta');
        cont.innerHTML = ""; // LIMPA SEMPRE
        if(!pastaAtiva || !dbDados[pastaAtiva]) return;
        const musicas = Object.values(dbDados[pastaAtiva]);
        musicas.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
            card.innerHTML = `<div class="balao-nome">${m.titulo}</div><img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">`;
            cont.appendChild(card);
            if(i === focoM) card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        });
    }

    function iniciarMusica() {
        if (fila.length > 0) {
            tocando = true;
            const container = document.getElementById('player-container');
            container.classList.add('fullscreen-active');
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${fila[0].id}?autoplay=1&enablejsapi=1&controls=0" allow="autoplay"></iframe>`;
            window.addEventListener('message', (e) => {
                try {
                    const d = JSON.parse(e.data);
                    if (d.event === 'infoDelivery' && d.info.playerState === 0) {
                        fila.shift();
                        if (fila.length > 0) iniciarMusica();
                        else { tocando = false; container.classList.remove('fullscreen-active'); container.innerHTML = ""; }
                    }
                } catch(err){}
            });
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "Enter") { creditos++; musicasRestantes += 5; document.getElementById('status-txt').innerText = "CREDITOS: " + musicasRestantes; }
        if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; renderPastas(); }
        if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; renderPastas(); }
        if (e.code === "Space") { e.preventDefault(); pastaAtiva = generos[focoP]; focoM = 0; renderRoleta(); }
        if (pastaAtiva) {
            const lista = Object.values(dbDados[pastaAtiva]);
            if (e.key === "ArrowDown") { focoM = (focoM + 1) % lista.length; renderRoleta(); }
            if (e.key === "ArrowUp") { focoM = (focoM - 1 + lista.length) % lista.length; renderRoleta(); }
            if (e.key.toUpperCase() === "E" && musicasRestantes > 0) {
                const m = lista[focoM];
                fila.push({ id: m.videoID });
                musicasRestantes--;
                const fCont = document.getElementById('container-fila');
                const fItem = document.createElement('div');
                fItem.innerHTML = `<img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg" width="100%">`;
                fCont.appendChild(fItem);
                if (musicasRestantes === 0 && !tocando) iniciarMusica();
            }
        }
    });
</script>
</body>
</html>
