<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS TV | ROCKOLA LOCAL</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #111; padding: 0 20px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--blue); align-items: center; height: 65px; flex-shrink: 0; }
        .nav-pastas { display: flex; gap: 8px; overflow-x: auto; flex: 1; margin-right: 15px; }
        .btn-gen { background: #222; border: 1px solid var(--blue); color: var(--blue); padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .btn-gen.active { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        .display-creditos { background: var(--pink); color: #fff; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 18px; }
        
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .tv-frame { width: 60%; max-width: 600px; aspect-ratio: 16/9; background: #000; border: 6px solid #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .fullscreen-active { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 9999; border: none; border-radius: 0; }
        
        /* FILA LATERAL DIREITA */
        .col-fila { position: fixed; right: 0; top: 65px; width: 220px; bottom: 210px; background: rgba(10,10,10,0.9); border-left: 2px solid var(--pink); padding: 10px; overflow-y: auto; z-index: 100; }
        .fila-item { background: #1a1a1a; margin-bottom: 8px; padding: 8px; border-radius: 4px; border-left: 3px solid var(--blue); font-size: 11px; text-transform: uppercase; }
        .fila-item.tocando { border-left-color: var(--pink); background: #222; color: var(--pink); }

        footer { height: 210px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 15px; overflow-x: auto; flex-shrink: 0; }
        .video-card { min-width: 135px; margin-right: 15px; transition: 0.3s; background: #151515; border-radius: 8px; border: 2px solid #333; position: relative; height: 160px; }
        .video-card.foco-musica { transform: translateY(-10px); border-color: var(--pink); }
        .info-txt { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: #222; color: #fff; font-size: 10px; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .video-card.foco-musica .info-txt { background: var(--blue); color: #000; }
    </style>
</head>
<body>

<header>
    <div class="nav-pastas" id="menu-pastas"></div>
    <div class="display-creditos">CRÉDITOS: <span id="val-creditos">0</span> | ESCOLHAS: <span id="val-escolhas">0</span>/5</div>
</header>

<main>
    <div id="status-txt" style="color:var(--pink); font-weight:bold; margin-bottom:10px;">PRESSIONE ENTER PARA CRÉDITO</div>
    <div class="tv-frame" id="player-container">
        <audio id="audio-player" style="display:none"></audio>
        <div id="visual" style="font-size: 80px;">💿</div>
    </div>
</main>

<div class="col-fila" id="container-fila">
    <div style="color: var(--pink); font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px;">FILA DE REPRODUÇÃO</div>
    <div id="lista-fila"></div>
</div>

<footer><div id="container-roleta" style="display:flex; align-items: center;"></div></footer>

<script>
    let dbDados = {}, generos = [], focoP = 0, focoM = 0;
    let creditos = 0, escolhasDisponiveis = 0, pastaAtiva = null, fila = [], tocando = false;
    const player = document.getElementById('audio-player');

    function carregarDados() {
        dbDados = JSON.parse(localStorage.getItem('kbs_jukebox_db')) || {};
        generos = Object.keys(dbDados);
        renderMenu();
    }

    function renderMenu() {
        const menu = document.getElementById('menu-pastas');
        menu.innerHTML = generos.map((g, i) => `<div class="btn-gen ${i === focoP ? 'active' : ''}">${g}</div>`).join('');
    }

    function renderRoleta() {
        const cont = document.getElementById('container-roleta');
        cont.innerHTML = ""; 
        if(!pastaAtiva) return;
        dbDados[pastaAtiva].forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
            card.innerHTML = `<div style="height:120px; display:flex; align-items:center; justify-content:center; font-size:40px;">🎵</div><div class="info-txt">${m.titulo}</div>`;
            cont.appendChild(card);
            if(i === focoM) card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        });
    }

    function renderFilaVisual() {
        const lista = document.getElementById('lista-fila');
        lista.innerHTML = fila.map((m, i) => `
            <div class="fila-item ${i === 0 && tocando ? 'tocando' : ''}">
                ${i+1}. ${m.titulo}
            </div>
        `).join('');
    }

    function tocarProxima() {
        if (fila.length > 0) {
            tocando = true;
            player.src = fila[0].path;
            player.play();
            document.getElementById('status-txt').innerText = "TOCANDO: " + fila[0].titulo;
            document.getElementById('player-container').classList.add('fullscreen-active');
            renderFilaVisual();
        } else {
            tocando = false;
            document.getElementById('player-container').classList.remove('fullscreen-active');
            document.getElementById('status-txt').innerText = "KBS TV - AGUARDANDO";
            renderFilaVisual();
        }
    }

    player.onended = () => {
        fila.shift();
        tocarProxima();
    };

    document.addEventListener('keydown', (e) => {
        // ENTER = 1 Crédito (Dá 5 músicas)
        if (e.key === "Enter") { 
            creditos++; 
            escolhasDisponiveis += 5;
            document.getElementById('val-creditos').innerText = creditos;
            document.getElementById('val-escolhas').innerText = escolhasDisponiveis;
        }

        // Navegação Gêneros
        if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; renderMenu(); }
        if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; renderMenu(); }
        
        // Espaço = Entra na Pasta
        if (e.code === "Space") { 
            e.preventDefault(); 
            pastaAtiva = generos[focoP]; 
            focoM = 0; 
            renderRoleta(); 
        }
        
        if (pastaAtiva) {
            const lista = dbDados[pastaAtiva];
            if (e.key === "ArrowDown") { focoM = (focoM + 1) % lista.length; renderRoleta(); }
            if (e.key === "ArrowUp") { focoM = (focoM - 1 + lista.length) % lista.length; renderRoleta(); }
            
            // Tecla E = Escolhe a música
            if (e.key.toUpperCase() === "E") {
                if (escolhasDisponiveis > 0) {
                    fila.push(lista[focoM]);
                    escolhasDisponiveis--;
                    
                    // Se gastou as 5 de um crédito, desconta o crédito visual
                    if (escolhasDisponiveis % 5 === 0 && creditos > 0) {
                        creditos--;
                    }
                    
                    document.getElementById('val-creditos').innerText = creditos;
                    document.getElementById('val-escolhas').innerText = escolhasDisponiveis;
                    renderFilaVisual();

                    // Tocar automaticamente se for a primeira da fila
                    if (!tocando) tocarProxima();
                } else {
                    alert("INSIRA CRÉDITOS (ENTER)");
                }
            }
        }
    });

    window.addEventListener('storage', carregarDados);
    carregarDados();
</script>
</body>
</html>
