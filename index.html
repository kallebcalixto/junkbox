<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS JUKEBOX | FINAL PRO</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #050505; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Topo de Status */
        header { 
            background: #111; padding: 10px 25px; display: flex; justify-content: space-between; 
            border-bottom: 2px solid var(--blue); align-items: center; height: 50px; flex-shrink: 0;
        }
        .creditos { background: var(--pink); padding: 5px 15px; border-radius: 5px; font-size: 18px; font-weight: bold; box-shadow: 0 0 10px var(--pink); }

        /* Menu de Pastas */
        #menu-pastas { 
            display: flex; gap: 8px; padding: 10px; background: #151515; 
            border-bottom: 1px solid #333; height: 45px; align-items: center; flex-shrink: 0;
        }
        .pasta-item { padding: 5px 12px; background: #222; border-radius: 4px; border: 2px solid transparent; font-size: 13px; color: #777; }
        .pasta-item.foco { border-color: var(--blue); color: var(--blue); }
        .pasta-item.aberta { background: var(--blue); color: #000; font-weight: bold; }

        /* Layout Principal */
        main { flex: 1; display: grid; grid-template-columns: 1fr 300px; gap: 10px; padding: 10px; overflow: hidden; }
        
        .col-left { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

        /* PLAYER FIXO E CURTO */
        .tv-frame { 
            width: 100%; 
            height: 280px; 
            background: #000; border: 4px solid #222; border-radius: 8px; overflow: hidden; flex-shrink: 0;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* ROLETA SEMPRE VISÍVEL */
        #container-roleta { 
            flex: 1; display: flex; align-items: center; gap: 15px; 
            overflow-x: auto; padding: 10px; background: #080808; margin-top: 10px;
            border-top: 1px solid #1a1a1a;
        }
        .video-card { 
            min-width: 130px; transition: 0.3s; 
            background: #111; border-radius: 6px; border: 2px solid #333; overflow: hidden; 
        }
        .video-card img { width: 100%; display: block; opacity: 0.4; }
        .video-card.foco-musica { transform: translateY(-10px); border-color: var(--pink); opacity: 1; }
        .video-card.foco-musica img { opacity: 1; }

        /* FILA LATERAL */
        .col-fila { background: #0f0f0f; border-radius: 8px; padding: 10px; border: 1px solid #222; overflow-y: auto; height: 100%; }
        .fila-item { background: #1a1a1a; padding: 8px; margin-bottom: 5px; border-radius: 3px; font-size: 12px; border-left: 4px solid var(--pink); color: #ccc; }
        .fila-item.atual { border-left-color: var(--blue); color: var(--blue); font-weight: bold; background: #222; }

        .footer-info { background: #111; padding: 5px; text-align: center; font-size: 11px; color: #444; flex-shrink: 0; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--blue);">KBS TV - ROCKOLA JUKEBOX</div>
    <div id="status-txt" style="color:var(--pink); font-size: 13px; font-weight: bold;">AGUARDANDO...</div>
    <div class="creditos">CRÉDITOS: <span id="val-creditos">0</span></div>
</header>

<div id="menu-pastas"></div>

<main>
    <div class="col-left">
        <div class="tv-frame" id="player-container">
             <div style="color:#222; display:flex; align-items:center; justify-content:center; height:100%;">PLAYER KBS</div>
        </div>
        <div style="color: var(--blue); font-size: 11px; font-weight: bold; margin: 10px 0 0 5px;">ESCOLHA A MÚSICA (ROLETA):</div>
        <div id="container-roleta"></div>
    </div>

    <div class="col-fila">
        <h5 style="color:var(--pink); text-align:center; margin: 0 0 10px 0;">FILA DE REPRODUÇÃO</h5>
        <div id="container-fila"></div>
    </div>
</main>

<div class="footer-info">
    [ENTER] Crédito (5 Músicas) | [ESPAÇO] Abrir Pasta | [SETAS] Navegar | [E] Confirmar e Tocar
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWAIL5jCP0oziHaGxbaMfZLlLb5DxtqrU",
        authDomain: "junck-3b41b.firebaseapp.com",
        databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com",
        projectId: "junck-3b41b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let creditos = 0, musicasRestantes = 0, dbDados = {}, generos = [], focoP = 0, focoM = 0;
    let pastaAtiva = null, fila = [], tocando = false;

    // Carregar dados do Firebase
    onValue(ref(db, 'musicas'), (snapshot) => {
        dbDados = {};
        snapshot.forEach(c => {
            const m = c.val();
            if(!dbDados[m.genero]) dbDados[m.genero] = [];
            dbDados[m.genero].push(m);
        });
        generos = Object.keys(dbDados);
        renderPastas();
    });

    function renderPastas() {
        const menu = document.getElementById('menu-pastas');
        menu.innerHTML = "";
        generos.forEach((g, i) => {
            const div = document.createElement('div');
            div.className = `pasta-item ${i === focoP ? 'foco' : ''} ${g === pastaAtiva ? 'aberta' : ''}`;
            div.innerText = g;
            menu.appendChild(div);
        });
    }

    function renderRoleta() {
        const cont = document.getElementById('container-roleta');
        cont.innerHTML = "";
        if(!pastaAtiva) return;
        dbDados[pastaAtiva].forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
            card.innerHTML = `<img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">`;
            cont.appendChild(card);
            if(i === focoM) card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
    }

    function renderFila() {
        const cont = document.getElementById('container-fila');
        cont.innerHTML = "";
        fila.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `fila-item ${i === 0 ? 'atual' : ''}`;
            div.innerText = (i === 0 ? "▶ " : "") + m.titulo;
            cont.appendChild(div);
        });
    }

    // Função para tocar (Injeção limpa contra Erro 153)
    function iniciarMusica() {
        if (fila.length > 0) {
            tocando = true;
            const m = fila[0];
            const container = document.getElementById('player-container');
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${m.id}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('status-txt').innerText = "TOCANDO AGORA";
            renderFila();
        }
    }

    document.addEventListener('keydown', (e) => {
        // [ENTER] Créditos
        if (e.key === "Enter") {
            creditos++; musicasRestantes += 5;
            document.getElementById('val-creditos').innerText = creditos;
            document.getElementById('status-txt').innerText = "CRÉDITO ADICIONADO";
        }

        // Navegação de Pastas
        if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; renderPastas(); }
        if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; renderPastas(); }

        // [ESPAÇO] Abrir Roleta
        if (e.code === "Space") {
            e.preventDefault();
            pastaAtiva = generos[focoP];
            focoM = 0;
            renderPastas();
            renderRoleta();
        }

        // Navegação na Roleta
        if (pastaAtiva) {
            if (e.key === "ArrowDown") { focoM = (focoM + 1) % dbDados[pastaAtiva].length; renderRoleta(); }
            if (e.key === "ArrowUp") { focoM = (focoM - 1 + dbDados[pastaAtiva].length) % dbDados[pastaAtiva].length; renderRoleta(); }
        }

        // [E] Escolher e Iniciar Automático
        if (e.key.toUpperCase() === "E") {
            if (musicasRestantes > 0 && pastaAtiva) {
                const mus = dbDados[pastaAtiva][focoM];
                fila.push({ id: mus.videoID, titulo: mus.titulo || pastaAtiva });
                
                musicasRestantes--;
                if(musicasRestantes % 5 === 0 && creditos > 0) creditos--;
                document.getElementById('val-creditos').innerText = creditos;

                // SE FOR A PRIMEIRA DA FILA, TOCA SOZINHO
                if (fila.length === 1) {
                    iniciarMusica();
                } else {
                    document.getElementById('status-txt').innerText = "ADICIONADO À FILA";
                    renderFila();
                }
            } else {
                alert("COLOQUE CRÉDITO [ENTER] OU ABRA A PASTA [ESPAÇO]");
            }
        }
    });
</script>
</body>
</html>
