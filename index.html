<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS ROCKOLA | MP3 FINAL</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #111; padding: 0 20px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--blue); align-items: center; height: 65px; flex-shrink: 0; }
        .nav-pastas { display: flex; gap: 8px; overflow-x: auto; flex: 1; }
        .btn-gen { background: #222; border: 1px solid var(--blue); color: var(--blue); padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: bold; }
        .btn-gen.active { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        .display-creditos { background: var(--pink); color: #fff; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 18px; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); position: relative; }
        .tv-frame { width: 70%; max-width: 700px; aspect-ratio: 16/9; background: #000; border: 6px solid #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .fullscreen-active { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 9999; border: none; }
        .main-cover { width: 350px; height: 350px; object-fit: cover; border: 5px solid var(--blue); box-shadow: 0 0 40px var(--blue); display: none; }
        footer { height: 210px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 15px; overflow-x: auto; }
        .video-card { min-width: 140px; margin-right: 15px; transition: 0.3s; background: #151515; border-radius: 8px; border: 2px solid #333; position: relative; padding-bottom: 40px; height: 160px; }
        .video-card.foco-musica { transform: translateY(-10px); border-color: var(--pink); }
        .video-card img { width: 100%; height: 120px; object-fit: cover; opacity: 0.4; }
        .video-card.foco-musica img { opacity: 1; }
        .info-txt { position: absolute; bottom: 0; width: 100%; height: 40px; background: #222; color: #fff; font-size: 10px; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .video-card.foco-musica .info-txt { background: var(--blue); color: #000; }
    </style>
</head>
<body>
    <header><div class="nav-pastas" id="menu-pastas"></div><div class="display-creditos">CRÉDITOS: <span id="val-creditos">0</span></div></header>
    <main>
        <div class="tv-frame" id="player-container">
            <img id="capa-player" class="main-cover">
            <audio id="audio-player"></audio>
        </div>
    </main>
    <footer><div id="container-roleta" style="display:flex; align-items: center;"></div></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let creditos = 0, musicasRestantes = 0, dbDados = {}, generos = [], focoP = 0, focoM = 0;
        let pastaAtiva = null, fila = [], tocando = false;

        const audio = document.getElementById('audio-player');
        const capa = document.getElementById('capa-player');

        audio.onended = () => {
            fila.shift();
            if (fila.length > 0) tocar(fila[0]);
            else { 
                tocando = false; 
                document.getElementById('player-container').classList.remove('fullscreen-active'); 
                capa.style.display = "none"; 
            }
        };

        function tocar(m) {
            tocando = true;
            document.getElementById('player-container').classList.add('fullscreen-active');
            capa.src = m.capaUrl;
            capa.style.display = "block";
            audio.src = m.mp3Url;
            audio.play().catch(e => console.log("Erro ao tocar áudio"));
        }

        onValue(ref(db, 'jukebox'), (snap) => {
            dbDados = snap.val() || {};
            generos = Object.keys(dbDados);
            const menu = document.getElementById('menu-pastas');
            menu.innerHTML = "";
            generos.forEach((g, i) => {
                const btn = document.createElement('div');
                btn.className = `btn-gen ${i === focoP ? 'active' : ''}`;
                btn.innerText = g;
                menu.appendChild(btn);
            });
            if (pastaAtiva) renderRoleta();
        });

        function renderRoleta() {
            const cont = document.getElementById('container-roleta');
            cont.innerHTML = "";
            if(!pastaAtiva || !dbDados[pastaAtiva]) return;
            const musicas = Object.values(dbDados[pastaAtiva]);
            musicas.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
                card.innerHTML = `<img src="${m.capaUrl}"><div class="info-txt">${m.titulo}</div>`;
                cont.appendChild(card);
                if(i === focoM) card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Enter") { creditos++; musicasRestantes += 5; document.getElementById('val-creditos').innerText = creditos; }
            if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; }
            if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; }
            if (e.code === "Space") { e.preventDefault(); pastaAtiva = generos[focoP]; focoM = 0; renderRoleta(); }
            
            if (pastaAtiva) {
                const lista = Object.values(dbDados[pastaAtiva]);
                if (e.key === "ArrowDown") { focoM = (focoM + 1) % lista.length; renderRoleta(); }
                if (e.key === "ArrowUp") { focoM = (focoM - 1 + lista.length) % lista.length; renderRoleta(); }
                if (e.key.toUpperCase() === "E" && musicasRestantes > 0) {
                    fila.push(lista[focoM]);
                    musicasRestantes--;
                    if(musicasRestantes % 5 === 0 && creditos > 0) { creditos--; document.getElementById('val-creditos').innerText = creditos; }
                    if (!tocando) tocar(fila[0]);
                }
            }
        });
    </script>
</body>
</html>
