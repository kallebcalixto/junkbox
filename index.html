<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>KBS TV | ROCKOLA AUTO-NEXT</title>

<style>
:root { --blue: #00d2ff; --pink: #ff007f; --bg: #000; }

body {
    background: var(--bg);
    color: #fff;
    font-family: sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

header {
    background: #111;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    border-bottom: 2px solid var(--blue);
    align-items: center;
    height: 65px;
}

.nav-pastas { display: flex; gap: 8px; overflow-x: auto; flex: 1; }

.btn-gen {
    background: #222;
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.btn-gen.active {
    background: var(--blue);
    color: #000;
}

.display-creditos {
    background: var(--pink);
    padding: 10px;
    font-weight: bold;
}

main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.tv-frame {
    width: 70%;
    max-width: 700px;
    aspect-ratio: 16/9;
    background: #000;
}

.fullscreen-active {
    position: fixed;
    top:0; left:0;
    width:100vw;
    height:100vh;
    z-index:9999;
}

#yt-player { width:100%; height:100%; }
</style>
</head>

<body>

<header>
<div class="nav-pastas" id="menu-pastas"></div>
<div class="display-creditos">CRÉDITOS: <span id="val-creditos">0</span></div>
</header>

<main>
<div id="status">AGUARDANDO...</div>
<div class="tv-frame" id="player-container">
    <div id="yt-player"></div>
</div>
</main>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let player;
let playerReady = false;
let fila = [];
let tocando = false;
let dbDados = {};
let generos = [];


// 🔵 PLAYER YOUTUBE
window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        playerVars: {
            autoplay: 1,
            controls: 0
        },
        events: {
            onReady: () => {
                playerReady = true;
                console.log("Player pronto");
            },
            onStateChange: onPlayerStateChange,
            onError: (e) => {
                console.log("Erro vídeo:", e.data);
                proximoVideo();
            }
        }
    });
};


// 🔵 QUANDO VÍDEO TERMINA
function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        proximoVideo();
    }
}


// 🔵 PRÓXIMO DA FILA
function proximoVideo() {
    fila.shift();

    if (fila.length > 0) {
        tocarVideo(fila[0]);
    } else {
        tocando = false;
        document.getElementById("status").innerText = "PRONTA";
    }
}


// 🔵 TOCAR
function tocarVideo(id) {
    if (!playerReady) return;

    tocando = true;

    player.loadVideoById(id);
    player.mute(); // evita bloqueio autoplay

    document.getElementById('player-container')
        .classList.add('fullscreen-active');
}


// 🔵 FIREBASE (UM ÚNICO LISTENER)
onValue(ref(db, 'jukebox'), (snap) => {
    dbDados = snap.val() || {};
    generos = Object.keys(dbDados);

    const menu = document.getElementById('menu-pastas');
    menu.innerHTML = "";

    generos.forEach(g => {
        const btn = document.createElement('div');
        btn.className = "btn-gen";
        btn.innerText = g;

        btn.onclick = () => {
            const lista = Object.values(dbDados[g]);

            if (!lista.length) return;

            const random = lista[Math.floor(Math.random() * lista.length)];

            fila.push(random.videoID);

            if (!tocando) {
                tocarVideo(fila[0]);
            }
        };

        menu.appendChild(btn);
    });
});

</script>

</body>
</html>
