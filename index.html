<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>KBS TV | ROCKOLA AUTO-NEXT</title>

<style>
:root { --blue: #00d2ff; --pink: #ff007f; --bg: #000; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

header { 
    background: #111; padding: 0 20px; display: flex; justify-content: space-between;
    border-bottom: 2px solid var(--blue); align-items: center; height: 65px;
}
.nav-pastas { display: flex; gap: 8px; overflow-x: auto; flex: 1; }
.btn-gen { background: #222; border: 1px solid var(--blue); color: var(--blue); padding: 8px 15px; border-radius: 20px; cursor: pointer; }
.btn-gen.active { background: var(--blue); color: #000; }

.display-creditos { background: var(--pink); padding: 10px; font-weight: bold; }

main { flex: 1; display: flex; align-items: center; justify-content: center; }

.tv-frame { width: 70%; max-width: 700px; aspect-ratio: 16/9; background: #000; }

.fullscreen-active { position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:9999; }

#yt-player { width:100%; height:100%; }

footer { height: 200px; overflow-x: auto; display:flex; align-items:center; }
.video-card { min-width: 120px; margin: 10px; border: 2px solid #333; }
.video-card.foco-musica { border-color: var(--pink); }
.video-card img { width:100%; }
</style>
</head>

<body>

<header>
<div class="nav-pastas" id="menu-pastas"></div>
<div class="display-creditos">CRÉDITOS: <span id="val-creditos">0</span></div>
</header>

<main>
<div id="status">AGUARDANDO...</div>
<div class="tv-frame" id="player-container">
    <div id="yt-player"></div>
</div>
</main>

<footer>
<div id="container-roleta" style="display:flex;"></div>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let player;
let ready = false;

let creditos = 0;
let musicasRestantes = 0;

let dbDados = {};
let generos = [];

let focoP = 0;
let focoM = 0;

let pastaAtiva = null;
let fila = [];
let tocando = false;


// 🔵 YOUTUBE
window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-player', {
        height: '100%',
        width: '100%',
        playerVars: { autoplay: 1 },
        events: {
            onReady: () => ready = true,
            onStateChange: onPlayerStateChange,
            onError: () => proximoVideo()
        }
    });
};

function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
        proximoVideo();
    }
}

function proximoVideo() {
    fila.shift();

    if (fila.length > 0) {
        tocarVideo(fila[0]);
    } else {
        tocando = false;
        document.getElementById("status").innerText = "PRONTA";
        document.getElementById('player-container').classList.remove('fullscreen-active');
    }
}

function tocarVideo(id) {
    if (!ready) return;

    tocando = true;

    player.loadVideoById(id);
    player.mute(); // garante autoplay

    document.getElementById('player-container')
        .classList.add('fullscreen-active');
}


// 🔵 FIREBASE
onValue(ref(db, 'jukebox'), (snap) => {
    dbDados = snap.val() || {};
    generos = Object.keys(dbDados);

    const menu = document.getElementById('menu-pastas');
    menu.innerHTML = "";

    generos.forEach((g, i) => {
        const btn = document.createElement('div');
        btn.className = `btn-gen ${i === focoP ? 'active' : ''}`;
        btn.innerText = g;
        menu.appendChild(btn);
    });

    renderRoleta();
});


// 🔵 ROLETA
function renderRoleta() {
    const cont = document.getElementById('container-roleta');
    cont.innerHTML = "";

    if (!pastaAtiva) return;

    const lista = Object.values(dbDados[pastaAtiva]);

    lista.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
        card.innerHTML = `<img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">`;
        cont.appendChild(card);
    });
}


// 🔵 CONTROLES
document.addEventListener('keydown', (e) => {

    // 💰 CRÉDITOS
    if (e.key === "Enter") {
        creditos++;
        musicasRestantes += 5;
        document.getElementById('val-creditos').innerText = creditos;
    }

    if (!generos.length) return;

    if (e.key === "ArrowRight") {
        focoP = (focoP + 1) % generos.length;
    }

    if (e.key === "ArrowLeft") {
        focoP = (focoP - 1 + generos.length) % generos.length;
    }

    if (e.code === "Space") {
        e.preventDefault();
        pastaAtiva = generos[focoP];
        focoM = 0;
        renderRoleta();
    }

    if (!pastaAtiva) return;

    const lista = Object.values(dbDados[pastaAtiva]);

    if (e.key === "ArrowDown") {
        focoM = (focoM + 1) % lista.length;
        renderRoleta();
    }

    if (e.key === "ArrowUp") {
        focoM = (focoM - 1 + lista.length) % lista.length;
        renderRoleta();
    }

    if (e.key.toUpperCase() === "E" && musicasRestantes > 0) {

        fila.push(lista[focoM].videoID);
        musicasRestantes--;

        if (musicasRestantes === 0 && !tocando) {
            tocarVideo(fila[0]);
        }
    }

});
</script>

</body>
</html>
