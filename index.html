<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS JUKEBOX | IDENTIFICADOR PRO</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #050505; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header { 
            background: #111; padding: 10px 25px; display: flex; justify-content: space-between; 
            border-bottom: 2px solid var(--blue); align-items: center; height: 50px; flex-shrink: 0;
        }
        .creditos { background: var(--pink); padding: 5px 15px; border-radius: 5px; font-size: 18px; font-weight: bold; }

        #menu-pastas { 
            display: flex; gap: 8px; padding: 10px; background: #151515; 
            border-bottom: 1px solid #333; height: 45px; align-items: center; flex-shrink: 0;
        }
        .pasta-item { padding: 5px 12px; background: #222; border-radius: 4px; border: 2px solid transparent; font-size: 13px; color: #777; }
        .pasta-item.foco { border-color: var(--blue); color: var(--blue); }
        .pasta-item.aberta { background: var(--blue); color: #000; font-weight: bold; }

        main { flex: 1; display: grid; grid-template-columns: 1fr 240px; gap: 20px; padding: 15px; overflow: hidden; position: relative; }
        
        .col-left { display: flex; flex-direction: column; height: 100%; align-items: center; overflow: hidden; }

        .tv-frame { 
            width: 560px; height: 315px; 
            background: #000; border: 5px solid #222; border-radius: 10px; 
            overflow: hidden; flex-shrink: 0; transition: all 0.5s ease;
            z-index: 100;
        }
        
        .fullscreen-active {
            position: fixed; top: 0; left: 0; width: 100vw !important; height: 100vh !important;
            max-width: none !important; border: none; border-radius: 0;
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        /* ROLETA COM NOMES REAIS */
        #container-roleta { 
            width: 100%; flex: 1; display: flex; align-items: center; gap: 25px; 
            overflow-x: auto; padding: 40px 10px 10px 10px; background: #080808; margin-top: 10px;
        }
        .video-card { 
            min-width: 150px; transition: 0.3s; background: #111; border-radius: 6px; 
            border: 2px solid #333; overflow: visible; position: relative; 
        }
        .video-card img { width: 100%; display: block; opacity: 0.4; border-radius: 4px; }
        
        /* NOME REAL DA MÚSICA (EX: ZEZE DI CAMARGO E LUCIANO...) */
        .video-card .nome-real {
            position: absolute; top: -35px; left: -10%; width: 120%;
            font-size: 11px; color: var(--blue); text-align: center;
            background: rgba(0,0,0,0.9); padding: 4px 0; border-radius: 4px;
            opacity: 0; transition: 0.3s; font-weight: bold; 
            text-transform: uppercase; line-height: 1.2;
            pointer-events: none; border: 1px solid var(--blue);
        }

        .video-card.foco-musica { transform: translateY(-10px); border-color: var(--pink); opacity: 1; }
        .video-card.foco-musica img { opacity: 1; }
        .video-card.foco-musica .nome-real { opacity: 1; top: -45px; } 

        .col-fila { background: #0f0f0f; border-radius: 8px; padding: 10px; border: 1px solid #222; overflow-y: auto; height: 100%; }
        .fila-card { width: 100%; margin-bottom: 8px; border-radius: 5px; overflow: hidden; border: 2px solid #333; background: #000; }
        .fila-card img { width: 100%; display: block; opacity: 0.6; }
        .fila-card.atual { border-color: var(--blue); }

        .footer-info { background: #111; padding: 5px; text-align: center; font-size: 11px; color: #444; flex-shrink: 0; }
    </style>
</head>
<body>

<header id="app-header">
    <div style="font-weight: bold; color: var(--blue);">KBS TV - ROCKOLA</div>
    <div id="status-txt" style="color:var(--pink); font-size: 13px;">AGUARDANDO...</div>
    <div class="creditos">CRÉDITOS: <span id="val-creditos">0</span></div>
</header>

<div id="menu-pastas"></div>

<main>
    <div class="col-left">
        <div class="tv-frame" id="player-container">
             <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#333;">ESCOLHA PARA TOCAR</div>
        </div>
        <div id="container-roleta"></div>
    </div>

    <div class="col-fila" id="app-fila">
        <h5 style="color:var(--pink); text-align:center; margin: 0 0 10px 0; font-size: 12px;">FILA</h5>
        <div id="container-fila"></div>
    </div>
</main>

<div class="footer-info">[ENTER] Crédito | [ESPAÇO] Pasta | [SETAS] Navegar | [E] Escolher Música</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWAIL5jCP0oziHaGxbaMfZLlLb5DxtqrU",
        authDomain: "junck-3b41b.firebaseapp.com",
        databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com",
        projectId: "junck-3b41b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let creditos = 0, musicasRestantes = 0, dbDados = {}, generos = [], focoP = 0, focoM = 0;
    let pastaAtiva = null, fila = [], tocando = false;

    onValue(ref(db, 'musicas'), (snapshot) => {
        dbDados = {};
        snapshot.forEach(c => {
            const m = c.val();
            if(!dbDados[m.genero]) dbDados[m.genero] = [];
            dbDados[m.genero].push(m);
        });
        generos = Object.keys(dbDados);
        renderPastas();
    });

    function renderPastas() {
        const menu = document.getElementById('menu-pastas');
        menu.innerHTML = "";
        generos.forEach((g, i) => {
            const div = document.createElement('div');
            div.className = `pasta-item ${i === focoP ? 'foco' : ''} ${g === pastaAtiva ? 'aberta' : ''}`;
            div.innerText = g;
            menu.appendChild(div);
        });
    }

    function renderRoleta() {
        const cont = document.getElementById('container-roleta');
        cont.innerHTML = "";
        if(!pastaAtiva) return;
        dbDados[pastaAtiva].forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
            // AQUI É ONDE APARECE O NOME REAL (EX: ZEZE DI CAMARGO...)
            card.innerHTML = `
                <div class="nome-real">${m.titulo || 'MÚSICA'}</div>
                <img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">
            `;
            cont.appendChild(card);
            if(i === focoM) card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
    }

    function renderFila() {
        const cont = document.getElementById('container-fila');
        cont.innerHTML = "";
        fila.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `fila-card ${i === 0 && tocando ? 'atual' : ''}`;
            div.innerHTML = `<img src="https://img.youtube.com/vi/${m.id}/mqdefault.jpg">`;
            cont.appendChild(div);
        });
    }

    function iniciarMusica() {
        if (fila.length > 0) {
            tocando = true;
            const m = fila[0];
            const container = document.getElementById('player-container');
            container.classList.add('fullscreen-active');
            container.innerHTML = `<iframe id="yt-player" src="https://www.youtube.com/embed/${m.id}?autoplay=1&enablejsapi=1&rel=0&controls=0" allow="autoplay"></iframe>`;
            renderFila();

            window.addEventListener('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.event === 'infoDelivery' && data.info && data.info.playerState === 0) {
                        fila.shift(); 
                        if (fila.length > 0) {
                            iniciarMusica();
                        } else {
                            tocando = false;
                            container.classList.remove('fullscreen-active');
                            container.innerHTML = '<div style="color:#333">KBS TV</div>';
                            renderFila();
                        }
                    }
                } catch(e){}
            });
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "Enter") { creditos++; musicasRestantes += 5; document.getElementById('val-creditos').innerText = creditos; }
        if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; renderPastas(); }
        if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; renderPastas(); }
        if (e.code === "Space") { e.preventDefault(); pastaAtiva = generos[focoP]; focoM = 0; renderPastas(); renderRoleta(); }
        if (pastaAtiva) {
            if (e.key === "ArrowDown") { focoM = (focoM + 1) % dbDados[pastaAtiva].length; renderRoleta(); }
            if (e.key === "ArrowUp") { focoM = (focoM - 1 + dbDados[pastaAtiva].length) % dbDados[pastaAtiva].length; renderRoleta(); }
        }
        if (e.key.toUpperCase() === "E") {
            if (musicasRestantes > 0 && pastaAtiva) {
                const mus = dbDados[pastaAtiva][focoM];
                fila.push({ id: mus.videoID, titulo: mus.titulo });
                musicasRestantes--;
                if(musicasRestantes % 5 === 0 && creditos > 0) creditos--;
                document.getElementById('val-creditos').innerText = creditos;
                renderFila();
                if (musicasRestantes === 0 && !tocando) iniciarMusica();
            }
        }
    });
</script>
</body>
</html>
