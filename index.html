<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS TV | ROCKOLA OFICIAL</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #111; padding: 0 20px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--blue); align-items: center; height: 65px; flex-shrink: 0; }
        .nav-pastas { display: flex; gap: 8px; overflow-x: auto; flex: 1; margin-right: 15px; }
        .btn-gen { background: #222; border: 1px solid var(--blue); color: var(--blue); padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: bold; }
        .btn-gen.active { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        .display-creditos { background: var(--pink); color: #fff; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 18px; box-shadow: 0 0 15px var(--pink); }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .tv-frame { width: 70%; max-width: 700px; aspect-ratio: 16/9; background: #000; border: 6px solid #222; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .fullscreen-active { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; border: none !important; border-radius: 0 !important; }
        #yt-player { width: 100%; height: 100%; }
        footer { height: 210px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 15px; overflow-x: auto; flex-shrink: 0; }
        .video-card { min-width: 135px; margin-right: 15px; transition: 0.3s; background: #151515; border-radius: 8px; border: 2px solid #333; position: relative; padding-bottom: 40px; }
        .video-card.foco-musica { transform: translateY(-10px); border-color: var(--pink); }
        .video-card img { width: 100%; border-radius: 6px 6px 0 0; opacity: 0.4; }
        .video-card.foco-musica img { opacity: 1; }
        .info-txt { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: #222; color: #fff; font-size: 10px; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; text-transform: uppercase; border-radius: 0 0 6px 6px; padding: 2px; box-sizing: border-box; }
        .video-card.foco-musica .info-txt { background: var(--blue); color: #000; }
        .col-fila { position: fixed; right: 10px; top: 85px; width: 140px; bottom: 230px; border-left: 2px solid var(--pink); padding: 5px; background: rgba(0,0,0,0.5); overflow-y: auto; z-index: 10; }
        .fila-item { margin-bottom: 5px; border: 1px solid #333; border-radius: 4px; overflow: hidden; }
        .fila-item img { width: 100%; display: block; }
    </style>
</head>
<body>
<header><div class="nav-pastas" id="menu-pastas"></div><div class="display-creditos">CRÉDITOS: <span id="val-creditos">0</span></div></header>
<main><div id="status-txt" style="color:var(--pink); font-weight:bold; margin-bottom:10px;">SELECIONE A PASTA [ESPAÇO]</div><div class="tv-frame" id="player-container"><div id="yt-player"></div></div></main>
<div class="col-fila" id="container-fila"></div>
<footer><div id="container-roleta" style="display:flex; align-items: center;"></div></footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let player, isPlayerReady = false, creditos = 0, musicasRestantes = 0, dbDados = {}, generos = [], focoP = 0, focoM = 0;
    let pastaAtiva = null, fila = [], tocando = false;

    // API DO YOUTUBE
    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('yt-player', {
            height: '100%', width: '100%',
            playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'iv_load_policy': 3, 'enablejsapi': 1 },
            events: { 
                'onReady': (event) => { isPlayerReady = true; },
                'onStateChange': onPlayerStateChange 
            }
        });
    };

    function onPlayerStateChange(event) {
        // Se a música terminou (State 0)
        if (event.data === YT.PlayerState.ENDED) {
            fila.shift(); // Remove a que tocou
            if (fila.length > 0) {
                tocarAgora(fila[0].id);
            } else {
                tocando = false;
                document.getElementById('player-container').classList.remove('fullscreen-active');
                document.getElementById('status-txt').innerText = "KBS TV - PRONTA";
                renderFilaVisual();
            }
        }
    }

    function tocarAgora(id) {
        if (!isPlayerReady || !id) return;
        tocando = true;
        const container = document.getElementById('player-container');
        container.classList.add('fullscreen-active');
        player.loadVideoById(id);
        player.playVideo(); // Força o play
        renderFilaVisual();
    }

    onValue(ref(db, 'jukebox'), (snap) => {
        dbDados = snap.val() || {};
        generos = Object.keys(dbDados);
        const menu = document.getElementById('menu-pastas');
        menu.innerHTML = "";
        generos.forEach((g, i) => {
            const btn = document.createElement('div');
            btn.className = `btn-gen ${i === focoP ? 'active' : ''}`;
            btn.innerText = g;
            menu.appendChild(btn);
        });
        if (pastaAtiva) renderRoleta();
    });

    function renderRoleta() {
        const cont = document.getElementById('container-roleta');
        cont.innerHTML = ""; 
        if(!pastaAtiva || !dbDados[pastaAtiva]) return;
        const musicas = Object.values(dbDados[pastaAtiva]);
        musicas.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
            card.innerHTML = `<img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg"><div class="info-txt">${m.titulo}</div>`;
            cont.appendChild(card);
            if(i === focoM) card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        });
    }

    function renderFilaVisual() {
        const cont = document.getElementById('container-fila');
        cont.innerHTML = "";
        fila.forEach(m => {
            const item = document.createElement('div');
            item.className = 'fila-item';
            item.innerHTML = `<img src="https://img.youtube.com/vi/${m.id}/mqdefault.jpg">`;
            cont.appendChild(item);
        });
    }

    document.addEventListener('keydown', (e) => {
        // ENTER coloca crédito e "desperta" o player do Youtube (importante para o autoplay)
        if (e.key === "Enter") { 
            if(isPlayerReady) player.playVideo(); 
            creditos++; musicasRestantes += 5; 
            document.getElementById('val-creditos').innerText = creditos;
            document.getElementById('status-txt').innerText = "ESCOLHA " + musicasRestantes + " MÚSICAS";
        }
        
        if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; }
        if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; }
        if (e.code === "Space") { e.preventDefault(); pastaAtiva = generos[focoP]; focoM = 0; renderRoleta(); }
        
        if (pastaAtiva) {
            const lista = Object.values(dbDados[pastaAtiva]);
            if (e.key === "ArrowDown") { focoM = (focoM + 1) % lista.length; renderRoleta(); }
            if (e.key === "ArrowUp") { focoM = (focoM - 1 + lista.length) % lista.length; renderRoleta(); }
            
            // SELECIONAR MÚSICA (E)
            if (e.key.toUpperCase() === "E" && musicasRestantes > 0) {
                const mus = lista[focoM];
                fila.push({ id: mus.videoID });
                musicasRestantes--;
                
                // Consome crédito visual
                if(musicasRestantes % 5 === 0 && creditos > 0) {
                    creditos--;
                    document.getElementById('val-creditos').innerText = creditos;
                }
                
                renderFilaVisual();
                document.getElementById('status-txt').innerText = "FALTAM: " + musicasRestantes;

                // Se acabou de escolher as músicas do crédito e não tem nada tocando, TOCA!
                if (musicasRestantes === 0 && !tocando) {
                    tocarAgora(fila[0].id);
                }
            }
        }
    });
</script>
</body>
</html>
