<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>KBS JUKEBOX | VISUAL PRO</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --bg: #050505; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header { 
            background: #111; padding: 10px 25px; display: flex; justify-content: space-between; 
            border-bottom: 2px solid var(--blue); align-items: center; height: 50px; flex-shrink: 0;
        }
        .creditos { background: var(--pink); padding: 5px 15px; border-radius: 5px; font-size: 18px; font-weight: bold; }

        #menu-pastas { 
            display: flex; gap: 8px; padding: 10px; background: #151515; 
            border-bottom: 1px solid #333; height: 45px; align-items: center; flex-shrink: 0;
        }
        .pasta-item { padding: 5px 12px; background: #222; border-radius: 4px; border: 2px solid transparent; font-size: 13px; color: #777; }
        .pasta-item.foco { border-color: var(--blue); color: var(--blue); }
        .pasta-item.aberta { background: var(--blue); color: #000; font-weight: bold; }

        main { flex: 1; display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 15px; overflow: hidden; }
        
        .col-left { display: flex; flex-direction: column; height: 100%; align-items: center; overflow: hidden; }

        /* PLAYER TAMANHO IDEAL (MÉDIO) */
        .tv-frame { 
            width: 560px; height: 315px; /* Tamanho padrão YouTube médio */
            background: #000; border: 5px solid #222; border-radius: 10px; 
            overflow: hidden; flex-shrink: 0; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* ROLETA SEMPRE VISÍVEL */
        #container-roleta { 
            width: 100%; flex: 1; display: flex; align-items: center; gap: 15px; 
            overflow-x: auto; padding: 10px; background: #080808; margin-top: 10px;
        }
        .video-card { 
            min-width: 130px; transition: 0.3s; 
            background: #111; border-radius: 6px; border: 2px solid #333; overflow: hidden; 
        }
        .video-card img { width: 100%; display: block; opacity: 0.4; }
        .video-card.foco-musica { transform: translateY(-10px); border-color: var(--pink); opacity: 1; }
        .video-card.foco-musica img { opacity: 1; }

        /* FILA COM FOTOS (SEM CÓDIGO) */
        .col-fila { background: #0f0f0f; border-radius: 8px; padding: 10px; border: 1px solid #222; overflow-y: auto; height: 100%; }
        .fila-card { 
            width: 100%; margin-bottom: 10px; border-radius: 5px; overflow: hidden; 
            border: 2px solid #333; position: relative; background: #000;
        }
        .fila-card img { width: 100%; display: block; opacity: 0.7; }
        .fila-card.atual { border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .fila-card.atual img { opacity: 1; }
        .fila-card .tag { 
            position: absolute; bottom: 0; background: rgba(0,0,0,0.8); 
            width: 100%; font-size: 10px; padding: 2px; text-align: center; color: var(--blue);
        }

        .footer-info { background: #111; padding: 5px; text-align: center; font-size: 11px; color: #444; flex-shrink: 0; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--blue);">KBS TV - JUKEBOX PRO</div>
    <div id="status-txt" style="color:var(--pink); font-size: 13px;">ESCOLHA SUAS MÚSICAS</div>
    <div class="creditos">CRÉDITOS: <span id="val-creditos">0</span></div>
</header>

<div id="menu-pastas"></div>

<main>
    <div class="col-left">
        <div class="tv-frame" id="player-container">
             <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#444;">AGUARDANDO MÚSICAS...</div>
        </div>
        <div id="container-roleta"></div>
    </div>

    <div class="col-fila">
        <h5 style="color:var(--pink); text-align:center; margin: 0 0 10px 0;">FILA (FOTOS)</h5>
        <div id="container-fila"></div>
    </div>
</main>

<div class="footer-info">[ENTER] Créditos | [ESPAÇO] Abrir | [SETAS] Mudar | [E] Escolher</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWAIL5jCP0oziHaGxbaMfZLlLb5DxtqrU",
        authDomain: "junck-3b41b.firebaseapp.com",
        databaseURL: "https://junck-3b41b-default-rtdb.firebaseio.com",
        projectId: "junck-3b41b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let creditos = 0, musicasRestantes = 0, dbDados = {}, generos = [], focoP = 0, focoM = 0;
    let pastaAtiva = null, fila = [], tocando = false;

    // Firebase
    onValue(ref(db, 'musicas'), (snapshot) => {
        dbDados = {};
        snapshot.forEach(c => {
            const m = c.val();
            if(!dbDados[m.genero]) dbDados[m.genero] = [];
            dbDados[m.genero].push(m);
        });
        generos = Object.keys(dbDados);
        renderPastas();
    });

    function renderPastas() {
        const menu = document.getElementById('menu-pastas');
        menu.innerHTML = "";
        generos.forEach((g, i) => {
            const div = document.createElement('div');
            div.className = `pasta-item ${i === focoP ? 'foco' : ''} ${g === pastaAtiva ? 'aberta' : ''}`;
            div.innerText = g;
            menu.appendChild(div);
        });
    }

    function renderRoleta() {
        const cont = document.getElementById('container-roleta');
        cont.innerHTML = "";
        if(!pastaAtiva) return;
        dbDados[pastaAtiva].forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `video-card ${i === focoM ? 'foco-musica' : ''}`;
            card.innerHTML = `<img src="https://img.youtube.com/vi/${m.videoID}/mqdefault.jpg">`;
            cont.appendChild(card);
            if(i === focoM) card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
    }

    function renderFila() {
        const cont = document.getElementById('container-fila');
        cont.innerHTML = "";
        fila.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = `fila-card ${i === 0 && tocando ? 'atual' : ''}`;
            div.innerHTML = `
                <img src="https://img.youtube.com/vi/${m.id}/mqdefault.jpg">
                <div class="tag">${i === 0 && tocando ? "TOCANDO AGORA" : "NA FILA"}</div>
            `;
            cont.appendChild(div);
        });
    }

    function iniciarMusica() {
        if (fila.length > 0) {
            tocando = true;
            const m = fila[0];
            const container = document.getElementById('player-container');
            
            // Adicionado listener para pular quando acabar
            container.innerHTML = `<iframe id="yt-player" src="https://www.youtube.com/embed/${m.id}?autoplay=1&enablejsapi=1&rel=0" allow="autoplay"></iframe>`;
            
            document.getElementById('status-txt').innerText = "SHOW EM ANDAMENTO";
            renderFila();

            // Detectar fim da música para pular
            window.addEventListener('message', function(event) {
                if (event.data) {
                    const data = JSON.parse(event.data);
                    if (data.event === 'infoDelivery' && data.info && data.info.playerState === 0) {
                        fila.shift(); // Remove a que acabou
                        if (fila.length > 0) iniciarMusica(); else { tocando = false; container.innerHTML = ""; }
                    }
                }
            });
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "Enter") {
            creditos++; musicasRestantes += 5;
            document.getElementById('val-creditos').innerText = creditos;
        }

        if (e.key === "ArrowRight") { focoP = (focoP + 1) % generos.length; renderPastas(); }
        if (e.key === "ArrowLeft") { focoP = (focoP - 1 + generos.length) % generos.length; renderPastas(); }

        if (e.code === "Space") {
            e.preventDefault();
            pastaAtiva = generos[focoP]; focoM = 0;
            renderPastas(); renderRoleta();
        }

        if (pastaAtiva) {
            if (e.key === "ArrowDown") { focoM = (focoM + 1) % dbDados[pastaAtiva].length; renderRoleta(); }
            if (e.key === "ArrowUp") { focoM = (focoM - 1 + dbDados[pastaAtiva].length) % dbDados[pastaAtiva].length; renderRoleta(); }
        }

        if (e.key.toUpperCase() === "E") {
            if (musicasRestantes > 0 && pastaAtiva) {
                const mus = dbDados[pastaAtiva][focoM];
                fila.push({ id: mus.videoID, titulo: mus.titulo });
                musicasRestantes--;
                
                if(musicasRestantes % 5 === 0 && creditos > 0) creditos--;
                document.getElementById('val-creditos').innerText = creditos;
                renderFila();

                // Só toca quando acabar de escolher o pacote de créditos
                if (musicasRestantes === 0 && !tocando) iniciarMusica();
            }
        }
    });
</script>
</body>
</html>
